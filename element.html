<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Element Details</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  .element-card { border: 1px solid #333; padding: 15px; border-radius: 8px; width: 300px; background: #f8f8f8; }
</style>
</head>
<body>

<h1>Element Details</h1>

<template id="element-template">
  <div class="element-card">
    <h2 class="element-name"></h2>
    <p>Symbol: <span class="element-symbol"></span></p>
    <p>Atomic Number: <span class="element-number"></span></p>
    <p>Atomic Mass: <span class="element-mass"></span></p>
  </div>
</template>

<div id="info-panel"></div>

<script>
  // Mock "database" (replace with fetch from backend if needed)
  const elementsDB = {
    1: { name: "Hydrogen", symbol: "H", atomic_number: 1, atomic_mass: 1.008 },
    2: { name: "Helium", symbol: "He", atomic_number: 2, atomic_mass: 4.0026 },
    3: { name: "Lithium", symbol: "Li", atomic_number: 3, atomic_mass: 6.94 },
    4: { name: "Beryllium", symbol: "Be", atomic_number: 4, atomic_mass: 9.0122 },
    5: { name: "Boron", symbol: "B", atomic_number: 5, atomic_mass: 10.81 },
    6: { name: "Carbon", symbol: "C", atomic_number: 6, atomic_mass: 12.011 },
    7: { name: "Nitrogen", symbol: "N", atomic_number: 7, atomic_mass: 14.007 },
    8: { name: "Oxygen", symbol: "O", atomic_number: 8, atomic_mass: 15.999 },
  };

  // Helper to get query parameter
  function getQueryParam(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
  }

  const atomicNumber = getQueryParam('atomicNumber');
  const data = elementsDB[atomicNumber];

  if (data) {
    const template = document.getElementById('element-template');
    const clone = template.content.cloneNode(true);
    clone.querySelector('.element-name').textContent = data.name;
    clone.querySelector('.element-symbol').textContent = data.symbol;
    clone.querySelector('.element-number').textContent = data.atomic_number;
    clone.querySelector('.element-mass').textContent = data.atomic_mass;

    document.getElementById('info-panel').appendChild(clone);
  } else {
    document.getElementById('info-panel').textContent = "Element not found.";
  }
</script>
