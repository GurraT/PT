<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Periodic Table</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<h1>Neon Periodic Table</h1>
<div class="table">

  <!-- Period 1 -->
  <div class="element nonmetal" style="grid-column:1;">H<br><span class="number">1</span></div>
  <div class="element noble" style="grid-column:18;">He<br><span class="number">2</span></div>

  <!-- Period 2 -->
  <div class="element alkali" style="grid-column:1;">Li<br><span class="number">3</span></div>
  <div class="element alkaline" style="grid-column:2;">Be<br><span class="number">4</span></div>
  <div class="element nonmetal" style="grid-column:13;">B<br><span class="number">5</span></div>
  <div class="element nonmetal" style="grid-column:14;">C<br><span class="number">6</span></div>
  <div class="element nonmetal" style="grid-column:15;">N<br><span class="number">7</span></div>
  <div class="element nonmetal" style="grid-column:16;">O<br><span class="number">8</span></div>
  <div class="element halogen" style="grid-column:17;">F<br><span class="number">9</span></div>
  <div class="element noble" style="grid-column:18;">Ne<br><span class="number">10</span></div>

  <!-- Period 3 -->
  <div class="element alkali" style="grid-column:1;">Na<br><span class="number">11</span></div>
  <div class="element alkaline" style="grid-column:2;">Mg<br><span class="number">12</span></div>
  <div class="element metal" style="grid-column:13;">Al<br><span class="number">13</span></div>
  <div class="element nonmetal" style="grid-column:14;">Si<br><span class="number">14</span></div>
  <div class="element nonmetal" style="grid-column:15;">P<br><span class="number">15</span></div>
  <div class="element nonmetal" style="grid-column:16;">S<br><span class="number">16</span></div>
  <div class="element halogen" style="grid-column:17;">Cl<br><span class="number">17</span></div>
  <div class="element noble" style="grid-column:18;">Ar<br><span class="number">18</span></div>

  <!-- You can continue adding all elements in this style -->

</div>
</body>
</html>
