<!DOCTYPE html>
<html>
<head>
  <title>Periodic Table</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h1 {
      margin: 20px;
    }

    .table {
      display: grid;
      grid-template-columns: repeat(18, 60px);
      gap: 5px;
      justify-content: center;
    }

    .element {
      border: 1px solid #333;
      padding: 8px;
      background: white;
      font-size: 12px;
    }

    .symbol {
      font-size: 18px;
      font-weight: bold;
    }

    .number {
      font-size: 10px;
      text-align: left;
    }

    /* Colors by type */
    .alkali { background: #ff9999; }
    .alkaline { background: #ffcc99; }
    .nonmetal { background: #99ccff; }
    .noble { background: #c299ff; }
  </style>
</head>
<body>

<h1>Periodic Table</h1>

<div class="table">

  <!-- Period 1 -->
  <div class="element nonmetal" style="grid-column:1;">
    <div class="number">1</div>
    <div class="symbol">H</div>
  </div>

  <div class="element noble" style="grid-column:18;">
    <div class="number">2</div>
    <div class="symbol">He</div>
  </div>

  <!-- Period 2 -->
  <div class="element alkali" style="grid-column:1;">
    <div class="number">3</div>
    <div class="symbol">Li</div>
  </div>

  <div class="element alkaline" style="grid-column:2;">
    <div class="number">4</div>
    <div class="symbol">Be</div>
  </div>

  <div class="element nonmetal" style="grid-column:13;">
    <div class="number">5</div>
    <div class="symbol">B</div>
  </div>

  <div class="element nonmetal" style="grid-column:14;">
    <div class="number">6</div>
    <div class="symbol">C</div>
  </div>

  <div class="element nonmetal" style="grid-column:15;">
    <div class="number">7</div>
    <div class="symbol">N</div>
  </div>

  <div class="element nonmetal" style="grid-column:16;">
    <div class="number">8</div>
    <div class="symbol">O</div>
  </div>

  <div class="element nonmetal" style="grid-column:17;">
    <div class="number">9</div>
    <div class="symbol">F</div>
  </div>

  <div class="element noble" style="grid-column:18;">
    <div class="number">10</div>
    <div class="symbol">Ne</div>
  </div>

</div>

</body>
</html>
